project:
  name: "SpatialLens Assist"
  weeks: "1-3"

video:
  sample_fps: 2
  resize_width: 960
  max_frames: 80
  annotated_video_fps: 2

detection:
  backend: "yolo"  # options: yolo, mock
  model_name: "yolov8n.pt"
  # Raised from 0.25 to 0.35 on real campus footage: the lower value
  # produced many low-confidence flicker detections that became 1-2
  # frame tracks (the dominant cause of `uncertain/short_track`).
  confidence_threshold: 0.35
  target_classes:
    - "person"
    - "bicycle"
    - "motorcycle"
    - "skateboard"
  save_json: true
  save_csv: true

tracking:
  # Which tracking algorithm to use:
  #   "iou_centroid" (default) - the from-scratch per-class IoU + centroid
  #                              matcher in src/tracking.py. This is the
  #                              tracker the Week 2 report describes.
  #   "bytetrack"              - opt-in baseline using `supervision.ByteTrack`
  #                              (Kalman-filter-based, two-stage matching,
  #                              lost-track buffer). Better at re-identifying
  #                              after brief detection misses; drops detections
  #                              that never get associated with a confirmed
  #                              track instead of starting a fresh track.
  #                              Requires the `supervision` pip dep.
  backend: "iou_centroid"
  iou_threshold: 0.25
  centroid_distance_threshold_frac: 0.15
  # Raised from 2 to 4 so a track can survive brief detection misses
  # (YOLO occasionally drops an object for one or two sampled frames
  # before re-detecting it). Bigger values can cross-link unrelated
  # tracks, so 4 is a conservative middle ground.
  max_frame_gap: 4
  min_track_length: 2
  # ByteTrack-specific hyperparameters (used only when backend == "bytetrack").
  # Defaults match the supervision library defaults; tighten thresholds on
  # cleaner footage if you want fewer false positive tracks.
  bytetrack:
    track_activation_threshold: 0.25
    lost_track_buffer: 30
    minimum_matching_threshold: 0.8
    frame_rate: 30

motion:
  static_threshold_frac_diagonal: 0.04
  bbox_growth_threshold: 0.15
  horizontal_motion_threshold_frac_width: 0.08
  flow_magnitude_threshold: 1.0
  frame_diff_threshold: 25
  morphology_kernel_size: 5
  # Ego-motion compensation (Week 3 improvement).
  # When true:
  #   - Optical flow per-bbox stats subtract the per-frame median flow
  #     (a robust estimate of camera translation) so they describe
  #     object motion *relative to the background*, not absolute image
  #     motion. Mostly fixes hand-held / walking footage.
  #   - Frame differencing translation-aligns the previous frame to the
  #     current frame using cv2.findTransformECC before computing the
  #     diff, removing most of the false-positive motion mask area
  #     caused by camera pan.
  # Set to false to reproduce the un-compensated Week 1-2 behavior
  # (useful for ablation comparisons in the report).
  ego_motion_compensation: true
  # ECC motion model used for frame-diff alignment. Optical-flow
  # compensation always uses translation (it's a per-pixel subtraction
  # of the median flow vector, so an affine global motion would not
  # change the math). For frame-diff:
  #   "translation" (default) - 2 params (tx, ty). Fast and stable.
  #   "affine"               - 6 params; also handles rotation, scale,
  #                            and shear. Use this on hand-held footage
  #                            with sharp turns or rapid forward zoom.
  ego_motion_model: "translation"

outputs:
  save_annotated_frames: true
  save_annotated_video: true
  save_plots: true

mock:
  enabled_if_no_videos: true
  num_frames: 24
  width: 960
  height: 540
  scenarios:
    - "bike_approaching_left"
    - "scooter_crossing_left_to_right"
    - "person_walking_away"
    - "static_nonhazard"

# Week 3 — final hazard classification + evaluation.
hazard:
  approach_score_threshold: 0.55
  crossing_threshold_frac_width: 0.08
  static_threshold_frac_diagonal: 0.04
  bbox_growth_threshold: 0.15
  bbox_shrink_threshold: -0.15
  flow_threshold: 1.0
  frame_diff_overlap_threshold: 0.08
  center_motion_threshold_frac: 0.05
  # Tracks with fewer detected positions than this are auto-marked
  # uncertain (reason="short_track") because trajectory- and growth-based
  # cues can't be computed reliably from 1-2 detections. Raise it for
  # high-fps cameras, lower it for very short clips.
  min_track_frames: 3
  # When 'uncertain' is assigned, the classifier picks the most specific
  # near-miss reason from this set:
  #   short_track | near_approaching | near_crossing_left_to_right
  #   near_crossing_right_to_left | near_moving_away | conflicting_cues
  #   low_signal
  # The chosen reason is stored as the 'uncertain_reason' column and is
  # surfaced both in the 'evidence' string and the assistive alert text.
  near_miss_approach_margin: 0.25  # how close approach_score must be to
                                   # threshold for 'near_approaching'
  near_miss_crossing_fraction: 0.5  # |dx_norm| must be > this * crossing_frac
                                    # for 'near_crossing_*'
  use_depth_if_available: false  # depth module not implemented; bbox growth is the
                                 # main proxy for "approaching". Leave false unless
                                 # a depth backend is added later.

evaluation:
  label_file: "data/labels/hazard_labels.csv"
  output_dir: "outputs/evaluation"

alerts:
  save_alerts_json: true
  save_alerts_txt: true
  include_confidence: true

final_outputs:
  export_slide_assets: true
  export_demo_video: true
